name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="harmonic-${VERSION}-linux-x86_64.tar.gz"

          mkdir -p release

          cp src-tauri/target/release/harmonic release/harmonic
          cp packaging/harmonic.desktop release/harmonic.desktop

          cp src-tauri/icons/128x128@2x.png release/harmonic-256.png
          cp src-tauri/icons/icon.png release/harmonic-512.png

          tar -czf "$ARCHIVE" -C release .

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          overwrite_files: false