<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spectrum Visualizer</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <main class="shell" aria-label="Audio visualizer">
      <section class="visualizer-panel">
        <div class="screen" aria-label="Visualization canvas">
          <canvas id="visualizer" width="1280" height="640" aria-label="Audio visualizer"></canvas>
        </div>

        <div class="status-layer" aria-label="Capture status">
          <div class="source-block">
            <p class="eyebrow">Spectrum</p>
            <h1 id="trackTitle">Audio Input</h1>
          </div>
          <div class="status-stack">
            <p id="statusTextInline" class="capture-note">Starting audio capture.</p>
            <div class="readouts">
              <output id="levelReadout" class="data-chip">IDLE</output>
              <output id="performanceReadout" class="data-chip">VIS -- / AUD --</output>
            </div>
          </div>
        </div>

        <div class="controls">
          <label class="control-card">
            <span class="control-title">Gain</span>
            <input id="gain" type="range" min="0.6" max="2.6" value="1.45" step="0.05">
            <output id="gainValue" class="control-value" for="gain">1.45x</output>
          </label>
          <label class="control-card">
            <span class="control-title">Falloff</span>
            <input id="falloff" type="range" min="0.72" max="0.96" value="0.86" step="0.01">
            <output id="falloffValue" class="control-value" for="falloff">0.86</output>
          </label>
          <label class="control-card">
            <span class="control-title">Bands</span>
            <input id="bars" type="range" min="32" max="128" value="72" step="4">
            <output id="barsValue" class="control-value" for="bars">72</output>
          </label>
          <label class="control-card select-label">
            <span class="control-title">Mode</span>
            <select id="mode" aria-label="Visualization mode">
              <option value="bars">Bars</option>
              <option value="circle">Circle</option>
              <option value="mirror">Mirror</option>
              <option value="wave">Wave</option>
              <option value="orbit">Orbit</option>
              <option value="bloom">Bloom</option>
              <option value="tunnel">Tunnel</option>
              <option value="constellation">Constellation</option>
              <option value="spectrogram">Spectrogram</option>
            </select>
          </label>
          <label class="control-card select-label">
            <span class="control-title">Palette</span>
            <select id="palette">
              <option value="classic">Classic</option>
              <option value="fire">Fire</option>
              <option value="ice">Ice</option>
              <option value="mono">Terminal</option>
            </select>
            <span class="palette-preview" aria-hidden="true"></span>
          </label>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
